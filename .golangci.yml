run:
  timeout: 5m
  tests: true
  skip-dirs:
    - vendor

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosimple
    - unused
    - gofmt
    - goimports
    - misspell
    - gocritic
    - noctx

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - text: 'Error return value of .*(Close|Shutdown|Write).* is not checked'
      linters:
        - errcheck
    - text: 'G104'
      linters:
        - errcheck
